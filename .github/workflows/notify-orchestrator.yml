name: Notify Orchestrator

on:
  release:
    types: [published]
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger straylight build & deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: Freeside-Collective/straylight
          event-type: submodule-release
          client-payload: |
            {
              "submodule": "${{ github.event.repository.name }}",
              "ref": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
